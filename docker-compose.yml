services:

  # ─────────────────────────────────────────────────────────────────
  # PostgreSQL
  # ─────────────────────────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: xp_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-ipsolis}
      POSTGRES_USER: ${POSTGRES_USER:-xpuser}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-xpuser} -d ${POSTGRES_DB:-ipsolis}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  # ─────────────────────────────────────────────────────────────────
  # Redis (Celery Broker + Backend)
  # ─────────────────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: xp_redis
    restart: unless-stopped
    command: redis-server --appendonly yes
    volumes:
      - redis_data:/data
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 5s

  # ─────────────────────────────────────────────────────────────────
  # FastAPI – Dispatcher + REST API
  # ─────────────────────────────────────────────────────────────────
  api:
    build:
      context: ./api
      dockerfile: Dockerfile
      args:
        APP_VERSION: ${APP_VERSION:-1.0.0}
    container_name: xp_api
    restart: unless-stopped
    env_file: .env
    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-xpuser}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-ipsolis}
      CELERY_BROKER_URL: redis://redis:6379/0
      CELERY_RESULT_BACKEND: redis://redis:6379/1
    ports:
      - "8000:8000"
    volumes:
      - ./scripts:/app/scripts      # PowerShell scripts (read/write for script editor)
      - ./backups:/app/backups      # Local DB backups (shared with worker)
      - ./licenses:/app/license     # Signed .lic file (read-write: api handles uploads)
      - ./locales:/app/locales:ro   # Portal i18n JSON (served via /locales/*.json)
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 20s

  # ─────────────────────────────────────────────────────────────────
  # Celery Worker
  # ─────────────────────────────────────────────────────────────────
  worker:
    build:
      context: ./worker
      dockerfile: Dockerfile
    container_name: xp_worker
    restart: unless-stopped
    env_file: .env
    environment:
      DATABASE_URL: postgresql+psycopg2://${POSTGRES_USER:-xpuser}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-ipsolis}
      CELERY_BROKER_URL: redis://redis:6379/0
      CELERY_RESULT_BACKEND: redis://redis:6379/1
      PYTHONUNBUFFERED: "1"
    volumes:
      - ./scripts:/app/scripts:ro          # PowerShell scripts (read-only)
      - ./backups:/app/backups             # Local DB backups (shared with api)
      - ./licenses:/app/license:ro         # Signed .lic file (read-only)
      - ps_user_modules:/root/.local/share/powershell/Modules
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: >
      celery -A tasks worker
      --loglevel=info
      --pool=solo
      --queues=default,provision,reclaim,notifications
    healthcheck:
      test: ["CMD", "celery", "-A", "tasks", "inspect", "ping"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

  # ─────────────────────────────────────────────────────────────────
  # Celery Beat – Scheduler (Ablauf-Checks, Erinnerungen)
  # ─────────────────────────────────────────────────────────────────
  beat:
    build:
      context: ./worker
      dockerfile: Dockerfile
    container_name: xp_beat
    restart: unless-stopped
    env_file: .env
    environment:
      DATABASE_URL: postgresql+psycopg2://${POSTGRES_USER:-xpuser}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-ipsolis}
      CELERY_BROKER_URL: redis://redis:6379/0
      CELERY_RESULT_BACKEND: redis://redis:6379/1
    volumes:
      - beat_schedule:/app/beat_schedule
      - ./licenses:/app/license:ro         # Signed .lic file (read-only)
      - ps_user_modules:/root/.local/share/powershell/Modules
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: >
      celery -A tasks beat
      --loglevel=info
      --scheduler celery.beat.PersistentScheduler
      --schedule /app/beat_schedule/celerybeat-schedule

  # ─────────────────────────────────────────────────────────────────
  # Flower – Celery Monitoring UI
  # ─────────────────────────────────────────────────────────────────
  flower:
    build:
      context: ./worker
      dockerfile: Dockerfile
    container_name: xp_flower
    restart: unless-stopped
    env_file: .env
    environment:
      DATABASE_URL: postgresql+psycopg2://${POSTGRES_USER:-xpuser}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-ipsolis}
      CELERY_BROKER_URL: redis://redis:6379/0
      CELERY_RESULT_BACKEND: redis://redis:6379/1
      FLOWER_BASIC_AUTH: ${FLOWER_USER:-admin}:${FLOWER_PASSWORD:-admin}
    ports:
      - "5555:5555"
    depends_on:
      - redis
    command: >
      celery -A tasks flower
      --port=5555
      --broker=redis://redis:6379/0

volumes:
  postgres_data:
  redis_data:
  beat_schedule:
  ps_user_modules:
