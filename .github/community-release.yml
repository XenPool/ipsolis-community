name: Build & push community images

on:
  push:
    tags:
      - 'v[0-9]+.[0-9]+.[0-9]+'

permissions:
  contents: read
  packages: write

jobs:
  build:
    name: Build community images
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Extract version
        id: ver
        run: echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build & push API image
        uses: docker/build-push-action@v6
        with:
          context: ./api
          file: ./api/Dockerfile.community
          push: true
          platforms: linux/amd64
          tags: |
            ghcr.io/xenpool/ipsolis-api:${{ steps.ver.outputs.version }}
            ghcr.io/xenpool/ipsolis-api:latest
          build-args: APP_VERSION=${{ steps.ver.outputs.version }}
          cache-from: type=gha,scope=community-api
          cache-to: type=gha,scope=community-api,mode=max

      - name: Build & push Worker image
        uses: docker/build-push-action@v6
        with:
          context: ./worker
          file: ./worker/Dockerfile.community
          push: true
          platforms: linux/amd64
          tags: |
            ghcr.io/xenpool/ipsolis-worker:${{ steps.ver.outputs.version }}
            ghcr.io/xenpool/ipsolis-worker:latest
          cache-from: type=gha,scope=community-worker
          cache-to: type=gha,scope=community-worker,mode=max
