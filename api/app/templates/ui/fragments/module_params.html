{% if module %}
<div class="rounded-lg bg-surface-raised border border-token-border p-3 text-xs">
  <div class="font-medium text-body mb-1">{{ module.key }}</div>
  <div class="text-muted mb-2">{{ module.description }}</div>
  {% if module.params %}
  <div class="mb-2">
    <span class="text-muted/70">Parameter:</span>
    <span class="font-mono text-body ml-1">{{ module.params | join(', ') }}</span>
  </div>
  {% endif %}
  {% if module.output_keys %}
  <div>
    <span class="text-muted/70">Output keys:</span>
    <span class="font-mono text-green-700 ml-1">{{ module.output_keys | join(', ') }}</span>
    <span class="text-muted/70 ml-1">(added to context)</span>
  </div>
  {% endif %}
  {% if module.params %}
  <!-- Pre-fill default template -->
  <div class="mt-2">
    <button type="button"
            onclick="fillDefaultParams({{ module.params | tojson }})"
            class="text-blue-600 hover:underline">Insert default template</button>
  </div>
  {% endif %}
</div>
<script>
function fillDefaultParams(params) {
  const tpl = {};
  params.forEach(p => { tpl[p] = '{{' + p + '}}'; });
  document.getElementById('new-step-params').value = JSON.stringify(tpl, null, 2);
}
</script>
{% endif %}
