<!DOCTYPE html>
<html lang="en" class="h-full">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin Login – {{ app_title }}</title>
  {% include "_partials/theme_head.html" %}
</head>
<body class="h-full flex items-center justify-center bg-surface-raised font-sans text-body">
  <div class="absolute top-4 right-4">
    {% include "_partials/theme_toggle.html" %}
  </div>

  <div class="max-w-sm w-full mx-4">

    <div class="flex flex-col items-center mb-8">
      <img src="/static/logos/sunset_light.svg" alt="{{ app_title }}"
           class="block dark:hidden h-12 w-auto object-contain mb-3">
      <img src="/static/logos/sunset_dark.svg" alt="{{ app_title }}"
           class="hidden dark:block h-12 w-auto object-contain mb-3">
      <p class="text-xs uppercase tracking-[0.18em] text-muted">Admin Console</p>
    </div>

    <div class="bg-surface rounded-xl border border-token-border shadow-lg shadow-slate-900/5 dark:shadow-black/30 p-8">

      {% if error %}
      <div class="mb-5 px-4 py-3 rounded-lg bg-red-50 dark:bg-red-500/10 border border-red-200 dark:border-red-500/30 text-sm text-red-700 dark:text-red-300">
        {{ error }}
      </div>
      {% endif %}

      <form method="post" action="/ui/login" class="space-y-5">
        <div>
          <label for="password" class="block text-xs font-medium text-muted mb-1.5">Password</label>
          <input
            id="password"
            name="password"
            type="password"
            required
            autofocus
            class="w-full px-3 py-2 text-sm bg-surface-raised border border-token-border bg-surface text-body placeholder:text-muted/60 rounded-lg text-body placeholder:text-muted/70 focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-transparent"
            placeholder="Enter admin password"
          >
        </div>

        <button
          type="submit"
          class="w-full px-4 py-2.5 bg-blue-600 text-white text-sm font-semibold rounded-lg hover:bg-blue-700 focus:outline-none focus:ring-2 focus:ring-blue-500 focus:ring-offset-2 focus:ring-offset-surface transition-colors">
          Sign in
        </button>
      </form>

    </div>

  </div>
</body>
</html>
